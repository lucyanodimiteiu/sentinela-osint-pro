name: OSINT Sentinela Automat
on:
 schedule:
 - cron: '0 0 * * *'
 workflow_dispatch: {}
jobs:
  scan:
   runs-on: ubuntu-latest
   permissions:
    contents: write
   steps:
   - name: Checkout Repo
     uses: actions/checkout@v4
   - name: Setup Go
     uses: actions/setup-go@v5
     with:
      go-version: '>=1.21.0'
   - name: Install Tools
     run: |
      go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
      go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
      sudo cp ~/go/bin/* /usr/local/bin/
   - name: Scan Google
     run: |
      subfinder -d google.com -silent > subdomenii_raw.txt
      httpx -l subdomenii_raw.txt -mc 200 -silent -o raport_activ.txt
   - name: Trimite pe Telegram
     env:
       TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
       TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
     run: |
       if [ -f raport_activ.txt ]; then
         LINES_COUNT=$(wc -l < raport_activ.txt)
         MESSAGE="🔍 *Sentinela OSINT Pro - Scan Finalizat*%0A📅 Data: $(date '+%Y-%m-%d %H:%M:%S')%0A🌐 Țintă: google.com%0A✅ Subdomenii active: *${LINES_COUNT}*"
         
         # Trimitere mesaj de stare
         curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
           -d chat_id="${TELEGRAM_CHAT_ID}" \
           -d text="${MESSAGE}" \
           -d parse_mode="Markdown"
         
         # Trimitere fișier raport
         curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
           -F chat_id="${TELEGRAM_CHAT_ID}" \
           -F document=@raport_activ.txt \
           -F caption="Raportul complet cu subdomeniile active."
       else
         echo "Raportul nu a fost gasit!"
       fi
   - name: Commit Results
     run: |
      git config --local user.email "grigore@buncar.ai"
      git config --local user.name "Grigore Openclaw"
      git add raport_activ.txt
      git commit -m "Sentinela: Fix L6, L8 & Run $(date)" || echo "No changes"
      git push
